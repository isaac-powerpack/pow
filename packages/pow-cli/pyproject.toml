[project]
name = "pow-cli"
version = "0.1.0a3"
description = "Command line interface for Isaac Powerpack"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "click>=8.1.7",
    "distro>=1.9.0",
    "rich",
]
license = "Apache-2.0"
authors = [
    { name = "Titiwat Munintravong" },
    { name = "Isaac Powerpack Contributors" },
]

[project.scripts]
pow = "pow_cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pow_cli"]

[dependency-groups]
dev = ["pytest>=9.0.2", "pytest-mock>=3.15.1"]
