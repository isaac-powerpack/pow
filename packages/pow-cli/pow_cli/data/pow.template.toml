[sim]
version = "5.1.0"
ext_folders = ["./exts"]
cpu_performance_mode = false
headless = false
enable_ros = false
# list your default enable extensions
exts = ["isaacsim.code_editor.vscode"]
# Disable raytracingMotion by default to improve performance on lower-end hardware.
raw_args = ["--/renderer/raytracingMotion/enabled=false"]


[[profiles]]
# set profile name to call with `pow run -p <name>`
name = "perf"
# add your custom settings here, to override the default settings
cpu_performance_mode = true
# you can also add other settings here, such as:
# headless = true
# enable_ros = false
# exts = ["my_extension"]
